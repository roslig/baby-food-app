      return AGE_ORDER.indexOf(cur) >= AGE_ORDER.indexOf(min);
    }
    
    function daysSince(d) {
      return Math.floor((Date.now() - new Date(d).getTime()) / 864e5);
    }

    async function callClaude(prompt) {
      try {
        var response = await fetch("/api/claude", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ prompt: prompt })
        });

        var data = await response.json();

        if (data.error) {
          console.error("API Error from serverless proxy:", data.error);
          var errorMsg = typeof data.error === 'object' ? (data.error.message || JSON.stringify(data.error)) : data.error;
          throw new Error(errorMsg);
        }

        // Grab the raw text from Claude's response
        var rawText = data.content[0].text;

        // Custom Safeguard: If the response is a JSON string (for recipes or meal plans), 
        // return it raw so the app's JSON parser functions properly. 
        // Otherwise, convert Markdown text into clean HTML layout.
        var trimmed = rawText.trim();
        if (trimmed.startsWith("[") || trimmed.startsWith("{")) {
          return rawText;
        }

        return marked.parse(rawText);
      } catch (e) {
        console.error("Secure backend call failed:", e);
        throw e;
      }
    }

    var storage = {
      set: function(key, value) {
        try { localStorage.setItem(key, JSON.stringify(value)); } catch(e) {}
      },
      get: function(key) {
        try { return JSON.parse(localStorage.getItem(key)); } catch(e) { return null; }
      }
    };

        const u = { ...customFoods }; if (!u[customFoodCat]) u[customFoodCat] = [];
        u[customFoodCat] = [...u[customFoodCat], nf];
        setCustomFoods(u); saveTracker({ customFoods: u });
        setCustomFoodName(""); setShowAddCustom(false); showT(`${nf.name} added to library!`);
      }

      function genShoppingList(p) {
        const m = {};
        Object.values(p).forEach(d => {
          Object.values(d).forEach(meal => {
            if (meal?.ingredients) {
              meal.ingredients.forEach(i => {
                const k = i.toLowerCase().trim();
                m[k] = (m[k] || 0) + 1;
              });
            }
          });
        });
        return Object.entries(m).map(([n, c]) => ({
          name: n.charAt(0).toUpperCase() + n.slice(1),
          count: c,
          id: n
        })).sort((a, b) => b.count - a.count);
      }

      async function generateWeekPlan() {
        setLoadingPlan(true);
        const ai = AGES.find(a => a.value === babyAge);
        const prompt = `Act as an expert pediatric nutritionist. Generate a comprehensive 7-day baby food meal plan for a ${babyAge} baby. Respond in ${language}.
        Consistent developmental texture: ${ai.texture}. 
        Provide exactly 3 structured meals (Breakfast, Lunch, Dinner) for Monday through Sunday. Ensure meals are balanced, nutrient-dense, and introduce varied allergens carefully.
        No honey, salt, or refined sugars.
        Return ONLY a clean, valid JSON object without backticks, matching this schema precisely:
        {"Monday":{"Breakfast":{"name":"Sweet Potato Oatmeal Cook","ingredients":["10g Rolled Oats","30g Sweet Potato Puree","50ml Formula/Breastmilk"],"portions":"1 bowl"},"Lunch":{"name":"Veggie Puree Soup","ingredients":["20g Carrot","10g Zucchini"],"portions":"1 cup"},"Dinner":{"name":"Mash Avocado Treat","ingredients":["30g Ripe Avocado"],"portions":"1 portion"}},"Tuesday":{},"Wednesday":{},"Thursday":{},"Friday":{},"Saturday":{},"Sunday":{}}`;

        try {
          const res = await callClaude(prompt);
          const cleanedText = res.replace(/```json|```/g, "").trim();
          const np = JSON.parse(cleanedText);
          const sl = genShoppingList(np);
          setPlan(np); setShoppingList(sl); setCheckedItems({});
          savePlanner({ plan: np, shoppingList: sl, checkedItems: {} });
          showT("Weekly plan generated successfully! 🎉");
        } catch (e) {
          showT("Could not generate a weekly plan. Try again.");
        } finally {
          setLoadingPlan(false);
        }
      }

      async function addMealFromCookbook(recipe, day, meal) {
        const np = { ...plan, [day]: { ...(plan[day] || {}), [meal]: { name: recipe.name, ingredients: recipe.ingredients || [], portions: recipe.servings || "1 portion", fromCookbook: true } } };
        const sl = genShoppingList(np);
        setPlan(np); setShoppingList(sl); savePlanner({ plan: np, shoppingList: sl });
        setShowSlotPicker(null); showT(`${recipe.name} scheduled for ${day} ${meal}!`);
      }

      async function addCustomMealSlot(day, meal) {
        if (!customMealName.trim()) return;
        const np = { ...plan, [day]: { ...(plan[day] || {}), [meal]: { name: customMealName.trim(), ingredients: [], portions: "1 portion", custom: true } } };
        setPlan(np); savePlanner({ plan: np });
        setShowCustomMeal(null); setCustomMealName(""); showT("Custom meal scheduled!");
      }

      async function removeMealSlot(day, meal) {
        const np = { ...plan };
        if (np[day]) {
          delete np[day][meal];
          if (!Object.keys(np[day]).length) delete np[day];
        }
        const sl = genShoppingList(np);
        setPlan(np); setShoppingList(sl); savePlanner({ plan: np, shoppingList: sl });
      }

      function toggleCheck(id) {
        const u = { ...checkedItems, [id]: !checkedItems[id] };

      async function sendChatMessage(ov) {
        const text = ov || chatInput.trim();
        if ((!text && !chatImage) || chatLoading) return;

        const userMsgContent = chatImage ? `📷 [Attached Image] ${text || "Please analyze this!"}` : text;
        const updatedMessages = [...messages, { role: "user", content: userMsgContent }];
        setMessages(updatedMessages);
        setChatInput(""); setChatLoading(true);

        const hist = updatedMessages.map(m => `${m.role === "user" ? "Parent" : "Assistant"}: ${m.content}`).join("\n\n");
        const prompt = `Act as a warm, reassuring, and highly expert pediatric nutritionist. The baby is ${babyAge} old${babyName ? ` and named ${babyName}` : ""}.
        Respond in ${language}. Help the parent with toddler recipes, feeding routines, tracking symptoms, managing safe allergens, constipation issues, and meal prep advice.
        Safety warnings are mandatory: Never recommend honey for infants under 12 months, or whole nuts under 4 years. No added salt/sugar under 12 months.
        
        --- Conversation History ---
        ${hist}
        --- End of History ---
        Respond as Assistant:`;

        try {
          const res = await callClaude(prompt);
          // The returned response is already HTML parsed due to our new callClaude markdown handling
          setMessages(prev => [...prev, { role: "assistant", content: res, isHtml: true }]);
          setChatImage(null); setChatImageUrl(null);
        } catch (e) {
          setMessages(prev => [...prev, { role: "assistant", content: "<p class='text-red-500 font-semibold'>Sorry, there was an issue connecting to the assistant server. Please check your credentials.</p>", isHtml: true }]);

          setChatLoading(false);

                  ))}
                </div>

                {/* Sub-nav control selectors */}
                <div className="flex gap-2.5">
                  <button onClick={generateWeekPlan} disabled={loadingPlan} className="flex-[2] py-4 bg-gradient-to-r from-purple-500 to-indigo-500 text-white font-extrabold rounded-xl text-xs shadow-md disabled:opacity-40">
                    {loadingPlan ? "Creating 7-Day Plan..." : "✨ Auto-Generate Full Week"}
                  </button>
                  <button onClick={() => setPlannerView(p => p === "plan" ? "shopping" : "plan")} className={`flex-1 py-4 text-xs font-bold rounded-xl border transition-all ${plannerView === "shopping" ? 'bg-emerald-500 border-emerald-500 text-white shadow-sm' : 'bg-white border-stone-200 text-stone-600 hover:bg-stone-50'}`}>
                    🛒 Shopping List
                  </button>
                </div>

                {/* 7-day meal slots display */}
                {plannerView === "plan" && (
                  <div className="space-y-4">
                    <div className="flex gap-1.5 overflow-x-auto py-1 scrollbar-none">
                      {DAYS.map(day => {
                        const hasAllMeals = Object.keys(plan[day] || {}).length === 3;
                        return (
                          <button key={day} onClick={() => setActiveDay(day)} className={`px-4 py-2 rounded-full border text-xs font-bold transition-all relative whitespace-nowrap shadow-sm ${activeDay === day ? 'bg-purple-500 border-purple-500 text-white' : hasAllMeals ? 'bg-emerald-50 border-emerald-200 text-emerald-700' : 'bg-white border-stone-200 text-stone-600'}`}>
                            {day.slice(0,3)}
                            {hasAllMeals && <span className="absolute -top-1.5 -right-1 text-[10px]">✅</span>}
                          </button>
                        );
                      })}
                    </div>

                    <div className="space-y-4">
                      <h3 className="serif-title text-base font-extrabold text-stone-800">{activeDay}'s Schedule</h3>
                      {MEALS.map(meal => {
                        const entry = plan[activeDay]?.[meal];
                        return (
                          <div key={meal} className="bg-white rounded-3xl border border-stone-100 shadow-sm overflow-hidden flex flex-col">
                            <div className={`px-4 py-3 flex justify-between items-center ${entry ? 'bg-purple-500 text-white' : 'bg-stone-50 text-stone-600'}`}>
                              <div className="flex items-center gap-2.5">
                                <span className="text-xl">{MEAL_EMOJIS[meal]}</span>
                                <div>
                                  <div className="text-[9px] uppercase font-bold tracking-wider opacity-80">{meal}</div>
                                  {entry && <h4 className="font-extrabold text-xs tracking-tight">{entry.name}</h4>}
                                </div>
                              </div>
                              {entry && (
                                <button onClick={() => removeMealSlot(activeDay, meal)} className="text-[10px] font-bold bg-white/20 px-2.5 py-1 rounded-full hover:bg-white/35">Remove</button>
                              )}
                            </div>
                            
                            {entry ? (
                              <div className="p-4 space-y-3">
                                <div className="flex gap-2 flex-wrap">
                                  {entry.portions && <span className="bg-purple-50 text-purple-700 border border-purple-100 px-2.5 py-1 rounded-full text-[10px] font-bold">👥 Portions: {entry.portions}</span>}
                                  {entry.fromCookbook && <span className="bg-emerald-50 text-emerald-700 border border-emerald-100 px-2.5 py-1 rounded-full text-[10px] font-bold">📖 Safe Cookbook</span>}
                                  {entry.custom && <span className="bg-orange-50 text-orange-700 border border-orange-100 px-2.5 py-1 rounded-full text-[10px] font-bold">✏️ Custom Manual</span>}
                                </div>
                                {entry.ingredients?.length > 0 && (
                                  <div className="flex gap-1.5 flex-wrap">
                                    {entry.ingredients.map((ing, idx) => <span key={idx} className="bg-stone-50 border text-stone-500 text-[10px] font-semibold px-2 py-0.5 rounded-full">{ing}</span>)}
                                  </div>
                                )}
                              </div>
                            ) : (
                              <div className="p-4 grid grid-cols-2 gap-3">
                                <button onClick={() => setShowSlotPicker({ day: activeDay, meal })} className="py-2.5 border border-dashed border-purple-300 hover:bg-purple-50 text-purple-600 font-bold rounded-xl text-xs transition-all">📖 Insert Saved Recipe</button>
                                <button onClick={() => { setShowCustomMeal({ day: activeDay, meal }); setCustomMealName(""); }} className="py-2.5 border border-dashed border-orange-300 hover:bg-orange-50 text-orange-600 font-bold rounded-xl text-xs transition-all">✏️ Insert Custom</button>
                              </div>
                            )}
                          </div>
                        );
                      })}
                    </div>
                  </div>
                )}

                {/* Compiled Shopping Checklists */}
                {plannerView === "shopping" && (
                  <div className="space-y-4 animate-fade-in">
                    <div className="flex justify-between items-center">
                      <div>
                        <h3 className="serif-title text-base font-extrabold text-stone-800">Shopping List</h3>
                        <p className="text-xs text-stone-400">Aggregated quantities needed for the weekly plan</p>
                      </div>
                      <span className="text-xs font-extrabold text-emerald-500">{checkedCount} / {shoppingList.length} Checked</span>
                    </div>

                    {shoppingList.length === 0 ? (
                      <div className="bg-white rounded-3xl p-12 text-center border border-stone-100 shadow-sm flex flex-col items-center">
                        <div className="text-5xl mb-3">🛒</div>
                        <h4 className="font-bold text-stone-800 text-sm">List is empty</h4>
                        <p className="text-xs text-stone-400 max-w-xs">Create or auto-generate a 7-day meal plan above to compile your checklist.</p>
                      </div>
                    ) : (
                      <div className="space-y-2">
                        <div className="w-full bg-stone-100 h-2.5 rounded-full overflow-hidden mb-4">
                          <div className="bg-gradient-to-r from-emerald-400 to-teal-400 h-full transition-all duration-300" style={{width: `${shoppingList.length > 0 ? (checkedCount / shoppingList.length) * 100 : 0}%`}}></div>
                        </div>

                        {shoppingList.map(item => (
                          <div key={item.id} onClick={() => toggleCheck(item.id)} className={`bg-white rounded-2xl p-4 border transition-all flex items-center justify-between shadow-sm cursor-pointer select-none ${checkedItems[item.id] ? 'opacity-40 border-stone-200' : 'border-stone-100 hover:border-stone-200'}`}>
                            <div className="flex items-center gap-3">
                              <span className={`w-5 h-5 rounded-full border-2 flex items-center justify-center transition-all ${checkedItems[item.id] ? 'bg-emerald-500 border-emerald-500 text-white' : 'border-stone-300'}`}>
                                {checkedItems[item.id] && <span className="text-[10px]">✓</span>}
                              </span>
                              <div className="text-xs font-bold text-stone-800" style={{textDecoration: checkedItems[item.id] ? 'line-through' : 'none'}}>{item.name}</div>
                            </div>
                            {item.count > 1 && (
                              <span className="bg-purple-50 text-purple-700 text-[10px] font-bold px-2 py-0.5 rounded-full">Used in {item.count} meals</span>
                            )}
                          </div>
                        ))}
                      </div>
                    )}
                  </div>
                )}

                {/* Scheduling slots modals */}
                {showSlotPicker && (
                  <div className="fixed inset-0 bg-stone-900/60 backdrop-blur-sm flex items-end sm:items-center justify-center p-4 z-50">
                    <div className="bg-white rounded-t-3xl sm:rounded-2xl max-w-sm w-full p-6 shadow-xl animate-slide-up max-h-[70vh] overflow-y-auto space-y-4">
                      <div className="flex justify-between items-center border-b border-stone-100 pb-3">
                        <h3 className="serif-title font-extrabold text-stone-800 text-base">{MEAL_EMOJIS[showSlotPicker.meal]} Schedule saved recipe</h3>
                        <button onClick={() => setShowSlotPicker(null)} className="text-stone-400 hover:text-stone-600 font-bold text-xl">✕</button>
                      </div>
                      
                      {savedRecipes.length === 0 ? (
                        <div className="text-center p-6 text-xs font-bold text-stone-400">No saved recipes available. Craft ideas inside our Generator first!</div>
                      ) : (
                        savedRecipes.map(recipe => (
                          <div key={recipe.id} onClick={() => addMealFromCookbook(recipe, showSlotPicker.day, showSlotPicker.meal)} className="bg-stone-50 rounded-xl p-3.5 border border-stone-200 hover:border-stone-300 cursor-pointer flex justify-between items-center group transition-all">
                            <div>
                              <h4 className="font-extrabold text-stone-800 text-xs group-hover:text-purple-600 transition-all">{recipe.name}</h4>
                              <p className="text-[10px] text-stone-400 font-semibold">{recipe.babyAge}</p>
                            </div>
                            <span className="text-purple-500 font-extrabold text-base">+</span>
                          </div>
                        ))
                      )}
                    </div>
                  </div>
                )}

                {/* Scheduling custom manual entry modals */}
                {showCustomMeal && (
                  <div className="fixed inset-0 bg-stone-900/60 backdrop-blur-sm flex items-end sm:items-center justify-center p-4 z-50">
                    <div className="bg-white rounded-t-3xl sm:rounded-2xl max-w-sm w-full p-6 shadow-xl animate-slide-up space-y-4">
                      <h3 className="serif-title font-extrabold text-stone-800 text-base">Schedule Custom Entry</h3>
                      <input value={customMealName} onChange={e => setCustomMealName(e.target.value)} onKeyDown={e => e.key === "Enter" && addCustomMealSlot(showCustomMeal.day, showCustomMeal.meal)} placeholder="e.g. Mashed carrot with rice..." className="w-full px-4 py-3 border border-stone-200 bg-stone-50 rounded-xl text-xs font-semibold outline-none focus:ring-2 focus:ring-purple-500" />
                      
                      <div className="grid grid-cols-2 gap-3.5 pt-2">
                        <button onClick={() => setShowCustomMeal(null)} className="py-3 border border-stone-200 text-stone-600 font-bold rounded-xl text-xs hover:bg-stone-50">Cancel</button>
                        <button onClick={() => addCustomMealSlot(showCustomMeal.day, showCustomMeal.meal)} disabled={!customMealName.trim()} className="py-3 bg-purple-500 hover:bg-purple-600 text-white font-extrabold rounded-xl text-xs disabled:opacity-40">Add to Schedule</button>
                      </div>
                    </div>
                  </div>
                )}
              </div>
            )}
          </main>

          {/* Toast Notification Container */}
          <Toast toast={toast} />

          {/* Persistent global responsive Bottom Nav bar */}
          <BottomNav mode={mode} setMode={setMode} plannerView={plannerView} setPlannerView={setPlannerView} messages={messages} setMessages={setMessages} goHome={goHome} />
        </div>
      );
    }

    function FullRecipeCard({ r, onSave, showSave, saving, babyAge }) {
      return (
        <div className="bg-white rounded-3xl border border-stone-100 shadow-sm overflow-hidden animate-fade-in flex flex-col">
          {/* Header gradient banner */}
          <div className="bg-gradient-to-br from-orange-400 to-rose-400 p-6 text-white space-y-2 relative">
            <span className="text-[9px] uppercase tracking-widest font-extrabold bg-white/25 px-2.5 py-1 rounded-full">{r.babyAge || babyAge} development stage</span>
            <h3 className="serif-title text-xl font-black leading-tight">{r.name}</h3>
            <p className="text-xs text-white/95 leading-relaxed font-semibold">{r.description}</p>
            
            <div className="grid grid-cols-4 gap-2 pt-4 text-center text-[10px] font-bold">
              {[
                {l:"Prep", v: r.prepTime},
                {l:"Cook", v: r.cookTime},
                {l:"Yield", v: r.servings},
                {l:"Prep Level", v: r.difficulty}
              ].map((b, i) => (
                <div key={i} className="bg-white/10 rounded-xl py-2">
                  <div className="text-xs font-black">{b.v}</div>
                  <div className="text-white/80">{b.l}</div>
                </div>
              ))}
            </div>
          </div>

          <div className="p-5 space-y-5">
            {/* Pediatric note block */}
            {r.ageNote && (
              <div className="bg-emerald-50 border border-emerald-200 rounded-2xl p-4 flex gap-3 text-xs leading-relaxed">
                <span className="text-xl">👩‍⚕️</span>
                <div className="text-stone-700 font-semibold">
                  <strong className="text-emerald-800">Pediatric Developmental Check:</strong> {r.ageNote}
                </div>
              </div>
            )}

            {/* Nutrition facts section */}
            {r.nutrition && (
              <div className="space-y-2.5">
                <h4 className="text-xs font-bold uppercase tracking-widest text-stone-400">Portion Nutritional Values</h4>
                <div className="grid grid-cols-4 gap-2 text-center">
                  {[
                    {l: "Calories", v: r.nutrition.calories, bg: "bg-orange-50 text-orange-600 border-orange-100"},
                    {l: "Protein", v: r.nutrition.protein, bg: "bg-emerald-50 text-emerald-600 border-emerald-100"},
                    {l: "Iron", v: r.nutrition.iron, bg: "bg-rose-50 text-rose-600 border-rose-100"},
                    {l: "Calcium", v: r.nutrition.calcium, bg: "bg-purple-50 text-purple-600 border-purple-100"}
                  ].map((nut, i) => (
                    <div key={i} className={`rounded-xl py-2.5 border ${nut.bg}`}>
                      <div className="text-xs font-black leading-none mb-1">{nut.v}</div>
                      <div className="text-[9px] font-bold uppercase tracking-wider opacity-85 leading-none">{nut.l}</div>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {/* Ingredients checklist */}
            <div className="space-y-2.5">
              <h4 className="text-xs font-bold uppercase tracking-widest text-stone-400">Detailed Portions Checklist</h4>
              <div className="bg-stone-50 rounded-2xl p-4 border border-stone-100 space-y-2">
                {r.ingredients?.map((ing, i) => (
                  <div key={i} className="flex gap-2.5 text-xs text-stone-800 font-semibold">
                    <span className="text-orange-400">•</span>
                    <span>{ing}</span>
                  </div>
                ))}
              </div>
            </div>

            {/* Preparation directions steps */}
            <div className="space-y-2.5">
              <h4 className="text-xs font-bold uppercase tracking-widest text-stone-400">Step-by-Step Instructions</h4>
              <div className="space-y-4">
                {r.steps?.map((step, i) => (
                  <div key={i} className="flex gap-4">
                    <span className="w-6 h-6 rounded-full bg-orange-400 text-white font-extrabold text-[11px] flex items-center justify-center shrink-0 shadow-sm mt-0.5">{i+1}</span>
                    <p className="text-xs text-stone-700 leading-relaxed font-semibold">{step}</p>
                  </div>
                ))}
              </div>
            </div>

            {/* Feeding tip */}
            {r.tip && (
              <div className="bg-amber-50 border border-amber-200 rounded-2xl p-4 text-xs leading-relaxed flex gap-3">
                <span className="text-xl">💡</span>
                <div className="text-stone-700 font-semibold">
                  <strong className="text-amber-800">Pediatric Chef Pro-Tip:</strong> {r.tip}
                </div>
              </div>
            )}

            {/* Storage timeline rules */}
            {r.storageNote && (
              <div className="bg-blue-50 border border-blue-200 rounded-2xl p-4 text-xs leading-relaxed flex gap-3">
                <span className="text-xl">🧊</span>
                <div className="text-stone-700 font-semibold">
                  <strong className="text-blue-800">Fresh Preservation Guidelines:</strong> {r.storageNote}
                </div>
              </div>
            )}

            {/* Safe ingredients to introduce next */}
            {r.nextFoods && (
              <div className="bg-emerald-50/50 border border-emerald-200 rounded-2xl p-4 text-xs leading-relaxed space-y-2">
                <strong className="text-emerald-800 block">🌱 Allergen-safe next ingredients to add tomorrow:</strong>
                <div className="flex gap-1.5 flex-wrap">
                  {r.nextFoods.map((f, i) => (
                    <span key={i} className="bg-white border border-emerald-200 text-emerald-700 font-bold px-2.5 py-1 rounded-full text-[10px]">{f}</span>
                  ))}
                </div>
              </div>
            )}

            {showSave && onSave && (
              <button onClick={onSave} disabled={saving} className="w-full mt-2 py-4 bg-gradient-to-r from-emerald-500 to-teal-500 text-white font-extrabold rounded-xl text-sm transition-all shadow-md hover:opacity-95 disabled:opacity-45">
                {saving ? "Saving to Safe Memory..." : "💾 Save to Safe Cookbook"}
              </button>
            )}
          </div>
        </div>
      );
    }

    function RatingModal({ showRatingModal, setShowRatingModal, ratingStars, setRatingStars, ratingTags, setRatingTags, ratingNote, setRatingNote, saveRating }) {
      if (!showRatingModal) return null;
      return (
        <div className="fixed inset-0 bg-stone-900/60 backdrop-blur-sm flex items-end sm:items-center justify-center p-4 z-50">
          <div className="bg-white rounded-t-3xl sm:rounded-2xl max-w-sm w-full p-6 shadow-xl animate-slide-up space-y-4 max-h-[85vh] overflow-y-auto">
            <div className="flex justify-between items-center border-b border-stone-100 pb-3">
              <h3 className="serif-title font-extrabold text-stone-800 text-base">Rate: {showRatingModal.name}</h3>
              <button onClick={() => setShowRatingModal(null)} className="text-stone-400 hover:text-stone-600 font-bold text-xl">✕</button>
            </div>

            <div className="text-center space-y-2">
              <span className="text-xs font-bold text-stone-400 uppercase tracking-widest">Pediatric Acceptance</span>
              <div className="flex justify-center gap-3">
                {[1,2,3].map(i => (
                  <span key={i} onClick={() => setRatingStars(i)} className={`text-4xl cursor-pointer transition-all ${i <= ratingStars ? 'opacity-100' : 'opacity-20'}`}>⭐</span>
                ))}
              </div>
              <div className="text-xs font-extrabold text-orange-400">
                {ratingStars === 1 ? "Needs texture adjustment" : ratingStars === 2 ? "Accepted cleanly!" : ratingStars === 3 ? "All-time favorite! 🎉" : "Tap stars to rate"}
              </div>
            </div>

            <div className="space-y-2">
              <span className="text-xs font-bold text-stone-400 uppercase tracking-widest block">Classify Cook Labels</span>
              <div className="grid grid-cols-2 gap-2">
                {TAGS.map(t => {
                  const hasTag = ratingTags.includes(t.id);
                  return (
                    <div key={t.id} onClick={() => setRatingTags(p => hasTag ? p.filter(x => x !== t.id) : [...p, t.id])}
                      className={`p-2.5 rounded-xl border text-center text-xs font-bold cursor-pointer transition-all ${hasTag ? 'bg-stone-100 scale-[1.01]' : 'bg-stone-50 border-stone-200'}`} style={{color: hasTag ? t.color : '#57534E', borderColor: hasTag ? t.color : '#E7E5E4'}}>
                      {t.label}
                    </div>
                  );
                })}
              </div>
            </div>

            <div className="space-y-2">
              <span className="text-xs font-bold text-stone-400 uppercase tracking-widest block">Allergy or texture cooking notes</span>
              <textarea value={ratingNote} onChange={e => setRatingNote(e.target.value)} placeholder="e.g. Added soft broccoli florets, loved it!" rows={3} className="w-full px-4 py-3 border border-stone-200 bg-stone-50 rounded-xl text-xs font-semibold leading-normal outline-none focus:ring-2 focus:ring-orange-400 resize-none" />
            </div>

            <div className="grid grid-cols-2 gap-3.5 pt-2">
              <button onClick={() => setShowRatingModal(null)} className="py-3 border border-stone-200 text-stone-600 font-bold rounded-xl text-xs hover:bg-stone-50">Cancel</button>
              <button onClick={saveRating} disabled={ratingStars === 0} className="py-3 bg-orange-400 hover:bg-orange-500 text-white font-extrabold rounded-xl text-xs disabled:opacity-40">Save Review</button>
            </div>
          </div>
        </div>
      );
    }

    function Toast({ toast }) {
      if (!toast) return null;
      return (
        <div className="fixed bottom-24 left-1/2 -translate-x-1/2 bg-stone-900 text-white text-xs font-bold py-3 px-6 rounded-full shadow-lg z-50 whitespace-nowrap border border-stone-800 animate-fade-in">
          {toast}
        </div>
      );
    }

    function BottomNav({ mode, setMode, plannerView, setPlannerView, messages, setMessages, goHome }) {
      const navItems = [
        {id: "home", icon: "🏠", label: "Home"},
        {id: "recipe", icon: "🍽️", label: "Recipe"},
        {id: "chat", icon: "💬", label: "Chat"},
        {id: "cookbook", icon: "📖", label: "Book"},
        {id: "tracker", icon: "🥕", label: "Tracker"},
        {id: "planner", icon: "📅", label: "Planner"},
        {id: "shopping", icon: "🛒", label: "List"}
      ];

      function isActive(id) {
        if (id === "shopping") return mode === "planner" && plannerView === "shopping";
        return mode === id;
      }

      function handleClick(id) {
        if (id === "home") {
          goHome();
        } else if (id === "shopping") {
          setMode("planner");
          setPlannerView("shopping");
        } else {
          setMode(id);
          if (id === "chat" && messages.length === 0) {
            setMessages([{ role: "assistant", content: "<p>Hello! I am your developmental pediatrician and infant nutrition chatbot. How can I guide you today? 👶</p>", isHtml: true }]);
          }
        }
      }

      return (
        <div className="fixed bottom-0 left-0 right-0 bg-white border-t border-stone-100 py-3.5 px-2 flex justify-around items-center z-40 shadow-[0_-4px_16px_rgba(0,0,0,0.02)]">
          {navItems.map(item => {
            const active = isActive(item.id);
            return (
              <button key={item.id} onClick={() => handleClick(item.id)} className="flex flex-col items-center gap-1.5 focus:outline-none relative group shrink-0">
                <span className={`text-xl transition-all ${active ? 'scale-110' : 'opacity-40 group-hover:opacity-75'}`}>{item.icon}</span>
                <span className={`text-[9px] font-bold tracking-tight uppercase transition-all ${active ? 'text-orange-500 font-extrabold' : 'text-stone-400 group-hover:text-stone-600'}`}>{item.label}</span>
                {active && (
                  <span className="absolute -bottom-1 w-5 h-1 bg-orange-400 rounded-full"></span>
                )}
              </button>
            );
          })}
        </div>
      );
    }

    // Mount setup
    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<BabyFoodApp />);
  </script>
</body>
</html>
